  (function(){
    document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
    document.addEventListener('keydown',function(e){
      if(e.key==='F12'){e.preventDefault();return false;}
      if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C')){e.preventDefault();return false;}
      if(e.ctrlKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
      if(e.ctrlKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
      if(e.ctrlKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
    });
    document.addEventListener('dragstart',function(e){e.preventDefault();});
    document.addEventListener('selectstart',function(e){
      if(e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA')e.preventDefault();
    });
  })();
  </script>

function getChatResponse(txt) {

  if(t.includes('mechon') || t.includes('mechón') || t.includes('prueba')) return 'mechon';
  if(t.includes('hidrat') || t.includes('natural') || t.includes('huevo') || t.includes('aceite')) return 'hidratacion';
  if(t.includes('decol') || t.includes('decoloración') || t.includes('aclar')) return 'decoloracion';
  if(t.includes('tinte') || t.includes('mod a') || t.includes('módulo a')) return 'modA';
  if(t.includes('fantasia') || t.includes('fantasía') || t.includes('mod e') || t.includes('rosa') || t.includes('azul') || t.includes('mermaid')) return 'modE';
  if(t.includes('correc') || t.includes('mod f') || t.includes('error')) return 'modF';
  if(t.includes('cana') || t.includes('blanco')) return 'canas';
  if(t.includes('como') || t.includes('cómo') || t.includes('mod b') || t.includes('decol')) return 'modB';
  return 'default';
}

function speakChat(text) {
  if(!chatTTSEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'es-ES'; utt.rate = 0.91; utt.pitch = 1.06; utt.volume = 1.0;
  const voces = window.speechSynthesis.getVoices();
  const voz = voces.find(v=>v.name.toLowerCase().includes('google')&&v.lang==='es-ES')
    || voces.find(v=>v.lang==='es-ES')
    || voces.find(v=>v.lang.startsWith('es')) || null;
  if(voz) utt.voice = voz;
  utt.onstart = () => {
    chatSpeaking = true;
    const bar = document.getElementById('chat-audio-bar');
    if(bar) bar.style.display = 'flex';
  };
  utt.onend = utt.onerror = () => {
    chatSpeaking = false;
    const bar = document.getElementById('chat-audio-bar');
    if(bar) bar.style.display = 'none';
  };
  window.speechSynthesis.speak(utt);
}

  filtered.slice(0,4).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'chat-opt-btn';
    btn.textContent = opt.label;
    btn.onclick = () => {
      addChatMsg(opt.label, 'user');
      row.innerHTML = '';

        showChatOptions();

function useTTS(){
  const [playing,setPlaying]=useState(false);const [paused,setPaused]=useState(false);
  const [txt,setTxt]=useState("");const [spd,setSpd]=useState(0.95);
  const [voices,setVoices]=useState([]);const [vIdx,setVIdx]=useState(0);
  useEffect(()=>{
    const load=()=>{const all=window.speechSynthesis.getVoices();const es=all.filter(v=>v.lang.toLowerCase().startsWith('es'));setVoices(es.length?es:all);};
    load();window.speechSynthesis.onvoiceschanged=load;return()=>{window.speechSynthesis.cancel();};
  },[]);
  const speak=useCallback((text)=>{
    if(!text)return;window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang='es-ES';u.rate=spd;u.pitch=1.05;
    if(voices[vIdx])u.voice=voices[vIdx];
    u.onstart=()=>{setPlaying(true);setPaused(false);};
    u.onend=u.onerror=()=>{setPlaying(false);setPaused(false);setTxt("");};
    window.speechSynthesis.speak(u);setTxt(text.slice(0,110)+(text.length>110?"…":""));
  },[spd,voices,vIdx]);
  const pause=()=>{window.speechSynthesis.pause();setPlaying(false);setPaused(true);};
  const resume=()=>{window.speechSynthesis.resume();setPlaying(true);setPaused(false);};
  const stop=()=>{window.speechSynthesis.cancel();setPlaying(false);setPaused(false);setTxt("");};
  return{playing,paused,txt,spd,setSpd,voices,vIdx,setVIdx,speak,pause,resume,stop};
}
